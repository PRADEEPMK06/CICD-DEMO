name: Daily Test Build Deploy
on:
  schedule:
    - cron: '30 9 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir build
          cp -r app build/
          cp requirements.txt build/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying application..."