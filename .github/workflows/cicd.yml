name: Daily Test Build Deploy
on:
  schedule:
    - cron: '30 9 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir build
          cp -r app build/
          cp requirements.txt build/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying application..."
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - run: echo "Deploying application..."

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Daily CI/CD Pipeline Status
          to: pradeepmk799@gmail.com
          from: GitHub Actions
          body: |
            Daily CI/CD Pipeline Completed Successfully.
            ✓ Test Stage Completed
            ✓ Build Stage Completed
            ✓ Deploy Stage Completed
            Execution Time: 3:00 PM IST
            Repository: CICD-DEMO